<script>
(function() {
    const header = document.querySelector('header');
    const heroContent = document.querySelector('.hero-content');
    const h1 = header.querySelector('h1');
    if (!header || !h1 || !heroContent) return;

    // 1. Corrigindo as camadas via CSS dinâmico
    // Isso garante que o texto W.F.FUKUTA fique sempre no topo absoluto
    heroContent.style.position = 'relative';
    heroContent.style.zIndex = '20'; 
    h1.style.transition = 'text-shadow 0.2s ease-out';
    h1.style.setProperty('--s-size', '0px');

    // 2. Criar o canvas com z-index intermediário
    const canvas = document.createElement('canvas');
    Object.assign(canvas.style, {
        position: 'absolute',
        top: '0',
        left: '0',
        width: '100%',
        height: '100%',
        zIndex: '10', // Acima do mesh-bg (0) e abaixo do heroContent (20)
        pointerEvents: 'none'
    });
    header.appendChild(canvas);

    const ctx = canvas.getContext('2d', { alpha: true });
    let flowers = [];
    const colors = ['#58a6ff', '#7b5cff', '#20c997'];
    const DURATION_MS = 20000; 
    const startTime = Date.now();

    function resize() {
        canvas.width = header.offsetWidth;
        canvas.height = header.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Flower {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.maxHeight = Math.random() * 40 + 40;
            this.spawnDelay = Math.random() * (DURATION_MS * 0.7);
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.petals = Math.floor(Math.random() * 3) + 5;
            this.angle = (Math.random() - 0.5) * 0.4;
            this.done = false;
        }

        draw() {
            const elapsed = Date.now() - (startTime + this.spawnDelay);
            if (elapsed < 0) return;

            const progress = Math.min(1, elapsed / 5000); // 5s para cada flor crescer individualmente
            const currentHeight = this.maxHeight * progress;

            ctx.save();
            ctx.translate(this.x, canvas.height);
            
            // Caule simples (menos custoso que curvas complexas)
            ctx.beginPath();
            ctx.strokeStyle = '#20c997';
            ctx.lineWidth = 2;
            ctx.moveTo(0, 0);
            ctx.lineTo(currentHeight * this.angle, -currentHeight);
            ctx.stroke();

            // Flor
            if (progress > 0.4) {
                const fSize = (progress - 0.4) * 15;
                ctx.translate(currentHeight * this.angle, -currentHeight);
                
                ctx.fillStyle = this.color;
                for (let i = 0; i < this.petals; i++) {
                    ctx.rotate((Math.PI * 2) / this.petals);
                    ctx.beginPath();
                    ctx.arc(fSize, 0, fSize/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Miolo
                ctx.beginPath();
                ctx.fillStyle = '#fff';
                ctx.arc(0, 0, fSize/3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            
            if (progress === 1) this.done = true;
        }
    }

    for (let i = 0; i < 40; i++) flowers.push(new Flower());

    function animate() {
        const totalElapsed = Date.now() - startTime;
        const totalProgress = Math.min(1, totalElapsed / DURATION_MS);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Otimização: Shadow via CSS Variable (Hardware Accelerated)
        if (totalProgress < 1) {
            const s = (totalProgress * 6).toFixed(1);
            h1.style.textShadow = `${s}px ${s}px 0px #000`;
        } else {
            h1.style.textShadow = `6px 6px 0px #000`;
        }

        flowers.forEach(f => f.draw());

        // Se todas as flores "deram 100%", poderíamos parar o loop, 
        // mas como você quer que elas fiquem lá, mantemos o desenho básico.
        requestAnimationFrame(animate);
    }

    animate();
})();
</script>
