<script>
(function () {
  const currentScript = document.currentScript;
  const animationStyleId = 'aet-ball-animation-styles';
  const cardStyleId = 'aet-ball-card-styles';

  let removalObserver = null;

  function ensureStyle(id, cssText) {
    let styleElement = document.getElementById(id);
    if (!styleElement) {
      styleElement = document.createElement('style');
      styleElement.id = id;
      document.head.appendChild(styleElement);
    }
    styleElement.textContent = cssText;
    return styleElement;
  }

  function removeBySelector(selector) {
    document.querySelectorAll(selector).forEach(element => element.remove());
  }

  function parseCostBreakdown(rawValue) {
    const defaults = ['R$0,00', 'R$0,00', 'R$0,00'];
    if (!rawValue || typeof rawValue !== 'string') return defaults;

    const parts = rawValue.split('/').map(part => part.trim()).filter(Boolean);
    return [
      parts[0] || defaults[0],
      parts[1] || defaults[1],
      parts[2] || defaults[2]
    ];
  }

  function cleanupAnimationArtifacts() {
    removeBySelector('.aet-physics-container, .aet-splatter-svg, .aet-message-box');
    const overlay = document.getElementById('project-prompt-overlay');
    if (overlay) {
      overlay.classList.remove('aet-ball-active');
      overlay.style.removeProperty('display');
      overlay.style.removeProperty('opacity');
      overlay.style.removeProperty('overflow');
      overlay.style.removeProperty('pointer-events');
      overlay.setAttribute('aria-hidden', 'true');
    }
    const animationStyle = document.getElementById(animationStyleId);
    if (animationStyle) animationStyle.remove();
  }

  // --- CSS ATUALIZADO ---
  ensureStyle(
    animationStyleId,
    `
      #project-prompt-overlay.aet-ball-active {
        display: flex !important;
        opacity: 1 !important;
        overflow: hidden;
        pointer-events: none;
        background: transparent;
      }
      #project-prompt-overlay.aet-ball-active .project-prompt-card { display: none !important; }

      .aet-physics-container { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

      .aet-ball {
        position: absolute;
        width: 25px;
        height: 25px;
        background: #000;
        border: 2px solid #fff;
        border-radius: 50%;
        left: 0;
        top: 0;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      /* Mancha posicionada no canto inferior direito */
      .aet-splatter-svg {
        position: absolute;
        bottom: -100px;
        right: -100px;
        width: 500px;
        height: 500px;
        fill: #000;
        transform: scale(0);
        transform-origin: bottom right;
        transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        z-index: 5;
        pointer-events: auto;
      }

      .aet-splatter-svg.active { transform: scale(1.5); }
      .aet-splatter-svg.retract {
        transform: scale(0);
        opacity: 0;
        transition: all 0.5s ease-in;
      }

      /* Caixa de mensagem colada no canto inferior direito */
      .aet-message-box {
        position: absolute;
        bottom: 40px;
        right: 40px;
        width: 320px;
        text-align: right;
        color: #fff;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s ease;
        z-index: 15;
        pointer-events: none;
        padding: 20px;
      }

      .aet-message-box.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

      .aet-btn-ok {
        background: #fff;
        color: #000;
        border: none;
        padding: 10px 30px;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 15px;
        box-shadow: 4px 4px 0 #333;
        transition: transform 0.1s;
      }
      .aet-btn-ok:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #333; }
    `
  );

  ensureStyle(
    cardStyleId,
    `
      .column-j-data {
        margin-top: 15px;
        border-top: 2px dashed #000;
        padding: 10px 8px;
        font-size: 12px;
        background: #f9f9f9;
        overflow: hidden;
        transition: all 0.5s ease;
      }
      .column-j-data.aet-pending {
        visibility: hidden; height: 0; opacity: 0; margin: 0; padding: 0;
      }
      .column-j-data.aet-reveal {
        visibility: visible; height: auto; opacity: 1;
      }
      .j-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
      .j-val { font-weight: 700; color: #000; }
    `
  );

  const overlay = document.getElementById('project-prompt-overlay');
  if (!overlay) return;
  overlay.classList.add('aet-ball-active');

  const container = document.createElement('div');
  container.className = 'aet-physics-container';
  overlay.appendChild(container);

  const ball = document.createElement('div');
  ball.className = 'aet-ball';
  container.appendChild(ball);

  const splatter = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  splatter.setAttribute('viewBox', '0 0 100 100');
  splatter.setAttribute('class', 'aet-splatter-svg');
  // Path de mancha orgânica
  splatter.innerHTML = '<path d="M100,100 L100,40 Q90,35 80,45 T60,40 Q50,30 40,50 T20,70 Q10,85 30,100 Z" />';
  overlay.appendChild(splatter);

  const msgBox = document.createElement('div');
  msgBox.className = 'aet-message-box';
  msgBox.innerHTML = `
    <h2 style="font-size:20px; text-transform:uppercase; margin:0 0 10px; border-bottom:2px solid #fff; display:inline-block;">Custo Zero Real</h2>
    <p style="font-size:14px; line-height:1.4; margin:0;">O código deve ser um facilitador de escala, não um centro de custos. Minha abordagem entrega autonomia técnica total: sem taxas de hospedagem, sem taxas de suporte, apenas a robustez de um sistema que nasce pronto para operar sozinho</p>
    <button class="aet-btn-ok">ME MOSTRA</button>
  `;
  overlay.appendChild(msgBox);

  // --- LÓGICA DA FÍSICA ---
  let posX = 50;
  let posY = 50;
  let velX = 8;
  let velY = 3;
  const gravity = 0.4;
  const bounce = 0.65;
  let hasExploded = false;

  function explode() {
    hasExploded = true;
    ball.style.display = 'none';
    splatter.classList.add('active');
    setTimeout(() => msgBox.classList.add('active'), 300);
  }

  function updatePhysics() {
    if (hasExploded) return;

    velY += gravity;
    posX += velX;
    posY += velY;

    const maxX = window.innerWidth - 30;
    const maxY = window.innerHeight - 30;

    // Rebate nas paredes
    if (posY > maxY) { posY = maxY; velY *= -bounce; }
    if (posX > maxX) { posX = maxX; velX *= -bounce; }
    if (posX < 0) { posX = 0; velX *= -bounce; }

    // Condição de explosão: quando chegar perto do canto inferior direito
    const distToCorner = Math.hypot(posX - window.innerWidth, posY - window.innerHeight);
    
    if (distToCorner < 80 || (posX > window.innerWidth - 60 && posY > window.innerHeight - 60)) {
      explode();
      return;
    }

    ball.style.transform = `translate(${posX}px, ${posY}px)`;
    requestAnimationFrame(updatePhysics);
  }

  // --- AÇÃO DO BOTÃO OK ---
  msgBox.querySelector('.aet-btn-ok').onclick = function () {
    msgBox.classList.remove('active');
    splatter.classList.add('retract');

    // Inicia a animação nos cards
    document.querySelectorAll('.card').forEach((card, index) => {
      const custoPlanilha = card.dataset.custos || '';
      const [criacao, publicacao, manutencao] = parseCostBreakdown(custoPlanilha);

      // Cria o elemento se não existir
      let dataDiv = card.querySelector('.column-j-data');
      if (!dataDiv) {
        dataDiv = document.createElement('div');
        dataDiv.className = 'column-j-data aet-pending';

        const actions = card.querySelector('.actions');
        actions ? actions.insertAdjacentElement('afterend', dataDiv) : card.appendChild(dataDiv);
      }

      dataDiv.innerHTML = `
        <div class="j-row"><span>CRIAÇÃO:</span> <span class="j-val">${criacao}</span></div>
        <div class="j-row"><span>PUBLICAÇÃO:</span> <span class="j-val">${publicacao}</span></div>
        <div class="j-row"><span>MANUTENÇÃO:</span> <span class="j-val">${manutencao}</span></div>
      `;

      // Delay cascata para os cards aparecerem
      setTimeout(() => {
        dataDiv.classList.remove('aet-pending');
        dataDiv.classList.add('aet-reveal');
      }, 200 + (index * 150));
    });

    // Finaliza e limpa tudo
    setTimeout(() => {
      cleanupAnimationArtifacts();
    }, 1500);
  };

  updatePhysics();
})();
</script>
