<script>
 (function() {
    const header = document.querySelector('header');
    if (!header) return;

    // 1. Criar o canvas do jardim
    const canvas = document.createElement('canvas');
    canvas.id = 'garden-canvas';
    Object.assign(canvas.style, {
        position: 'absolute',
        top: '0',
        left: '0',
        width: '100%',
        height: '100%',
        zIndex: '1', // Fica atrás do texto (z-index 1) mas sobre o mesh (z-index 0)
        pointerEvents: 'none'
    });
    header.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    let flowers = [];
    const colors = ['#58a6ff', '#7b5cff', '#20c997', '#f2f2f2'];
    
    function resize() {
        canvas.width = header.offsetWidth;
        canvas.height = header.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Flower {
        constructor() {
            this.reset();
            this.delay = Math.random() * 2000; // Delay inicial para não nascer tudo junto
        }

        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height; // Começa na linha de baixo do header
            this.size = 0;
            this.maxSize = Math.random() * 15 + 10;
            this.growth = Math.random() * 0.2 + 0.1;
            this.stemHeight = 0;
            this.maxStemHeight = Math.random() * 40 + 20;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.angle = (Math.random() - 0.5) * 0.5; // Inclinação do caule
            this.petals = Math.floor(Math.random() * 3) + 5;
            this.life = 0;
            this.born = Date.now();
        }

        draw() {
            const now = Date.now();
            if (now - this.born < this.delay) return;

            ctx.save();
            ctx.translate(this.x, canvas.height);
            
            // Desenhar Caule
            ctx.beginPath();
            ctx.strokeStyle = '#20c997';
            ctx.lineWidth = 2;
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(10 * this.angle, -this.stemHeight/2, 5 * this.angle, -this.stemHeight);
            ctx.stroke();

            // Desenhar Flor no topo do caule
            if (this.stemHeight >= this.maxStemHeight) {
                ctx.translate(5 * this.angle, -this.stemHeight);
                ctx.rotate(this.life * 0.01); // Rotação sutil
                
                for (let i = 0; i < this.petals; i++) {
                    ctx.beginPath();
                    ctx.fillStyle = this.color;
                    ctx.rotate((Math.PI * 2) / this.petals);
                    ctx.ellipse(this.size, 0, this.size, this.size/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Miolo
                ctx.beginPath();
                ctx.fillStyle = '#fff';
                ctx.arc(0, 0, this.size/3, 0, Math.PI * 2);
                ctx.fill();

                if (this.size < this.maxSize) this.size += this.growth;
            }

            if (this.stemHeight < this.maxStemHeight) this.stemHeight += 0.8;
            
            this.life++;
            ctx.restore();
        }
    }

    // Inicializar jardim (60 flores)
    for (let i = 0; i < 60; i++) {
        flowers.push(new Flower());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        flowers.forEach(f => f.draw());
        requestAnimationFrame(animate);
    }

    animate();

    // 2. Timer de 20 segundos para sumir suavemente
    setTimeout(() => {
        canvas.style.transition = 'opacity 3s ease';
        canvas.style.opacity = '0';
        setTimeout(() => canvas.remove(), 3000);
    }, 20000);

})();
</script>
