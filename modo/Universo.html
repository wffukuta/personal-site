<script>
  (function() {
    // Limpeza defensiva: remove vestígios de outros temas antes de aplicar o atual
    ['kindle-theme-overrides', 'universe-theme-overrides', 'cyberpunk-theme-overrides'].forEach(id => {
      const styleTag = document.getElementById(id);
      if (styleTag) styleTag.remove();
    });

    const root = document.documentElement;
    root.removeAttribute('style');
    // 1. Reativar e ajustar o Canvas (Nebulosa)
    const canvas = document.getElementById('mesh-bg');
    if (canvas) {
      canvas.style.display = 'block';
      canvas.style.opacity = '0.8'; // Deixa as cores da nebulosa mais vibrantes
    }

    // 2. Variáveis de Ambiente Espacial
    root.style.setProperty('--bg-body', '#020617'); // Preto azulado profundo
    root.style.setProperty('--bg-card', 'rgba(15, 23, 42, 0.7)'); // Vidro escuro
    root.style.setProperty('--border-color', 'rgba(255, 255, 255, 0.1)');
    root.style.setProperty('--text-main', '#f1f5f9'); // Branco estelar
    root.style.setProperty('--text-muted', '#94a3b8');
    root.style.setProperty('--link-color', '#38bdf8'); // Azul ciano brilhante

    // 3. Injetar o CSS de imersão estelar
    const styleId = 'universe-theme-overrides';
    let styleTag = document.getElementById(styleId);
    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = styleId;
      document.head.appendChild(styleTag);
    }

    styleTag.innerHTML = `
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

      body {
        font-family: 'Space Grotesk', sans-serif !important;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        background-attachment: fixed;
      }

      header {
        background: rgba(2, 6, 23, 0.4) !important;
        border-bottom: 1px solid rgba(56, 189, 248, 0.3) !important;
        backdrop-filter: blur(12px) !important;
      }

      h1 {
        text-transform: uppercase;
        letter-spacing: 4px;
        background: linear-gradient(to right, #fff, #38bdf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 700;
      }

      /* Cards com efeito HUD Espacial */
      .about, .card {
        backdrop-filter: blur(16px) !important;
        border-radius: 12px !important;
        background: rgba(30, 41, 59, 0.5) !important;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .card:hover {
        transform: translateY(-5px) scale(1.02);
        background: rgba(30, 41, 59, 0.8) !important;
      }

      /* Glow das Bordas conforme solicitado */
      .card--suporte-sim {
        border: 2px solid #0ea5e9 !important;
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.3) !important;
      }

      .card--suporte-nao {
        border: 2px solid #ef4444 !important;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.3) !important;
      }

      .card--suporte-em-breve {
        border: 2px solid #f59e0b !important;
        box-shadow: 0 0 15px rgba(245, 158, 11, 0.3) !important;
      }

      /* Botões Futuristas */
      .project-link {
        background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%) !important;
        color: #fff !important;
        border: none !important;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4) !important;
        text-transform: uppercase;
        font-weight: 700;
      }

      .video-link {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: #fff !important;
      }

      .video-link:hover {
        background: #38bdf8 !important;
        color: #020617 !important;
      }

      /* Chat Widget estilo Nave */
      .chat-widget {
        border: 1px solid rgba(56, 189, 248, 0.4) !important;
        background: rgba(15, 23, 42, 0.9) !important;
      }

      .chat-toggle {
        background: #38bdf8 !important;
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.5) !important;
      }
    `;

    console.log("Modo Universo ativado: Explorando as estrelas...");
  })();
</script>
