<script>
  (function() {
    // Limpeza defensiva: remove vestígios de outros temas antes de aplicar o atual
    ['kindle-theme-overrides', 'universe-theme-overrides', 'cyberpunk-theme-overrides'].forEach(id => {
      const styleTag = document.getElementById(id);
      if (styleTag) styleTag.remove();
    });

    const root = document.documentElement;
    root.removeAttribute('style');

    // 1. Reativar e exibir o Mesh Gradient (tema escuro original)
    const canvas = document.getElementById('mesh-bg');
    if (canvas) {
      canvas.style.display = 'block';
      canvas.style.opacity = '0.58';
      canvas.style.filter = 'none';
    }

    // 2. Restaurar variáveis de cor do visual original
    root.style.setProperty('--bg-body', '#0d1117');
    root.style.setProperty('--bg-card', '#161b22');
    root.style.setProperty('--border-color', '#30363d');
    root.style.setProperty('--text-main', '#c9d1d9');
    root.style.setProperty('--text-muted', '#8b949e');
    root.style.setProperty('--link-color', '#58a6ff');

    // 3. Injetar estilos para reconstituir o tema base antigo do index
    const styleId = 'kindle-theme-overrides';
    let styleTag = document.getElementById(styleId);

    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = styleId;
      document.head.appendChild(styleTag);
    }

    styleTag.innerHTML = `
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
        background-color: var(--bg-body) !important;
        background-image: none !important;
      }

      header {
        border-bottom: 1px solid var(--border-color) !important;
        background-color: rgba(22, 27, 34, 0.7) !important;
        backdrop-filter: blur(2px) !important;
      }

      h1, h2, h3 {
        text-transform: none !important;
        letter-spacing: normal !important;
        font-weight: inherit !important;
      }

      .about, .card {
        border: 1px solid var(--border-color) !important;
        border-radius: 8px !important;
        box-shadow: none !important;
      }

      .card:hover {
        transform: none !important;
        box-shadow: none !important;
      }

      .card--suporte-sim {
        border-color: #3fb950 !important;
        border-width: 8px !important;
      }

      .card--suporte-nao {
        border-color: #ff7b72 !important;
        border-width: 8px !important;
      }

      .card--suporte-em-breve {
        border-color: #d29922 !important;
        border-width: 8px !important;
      }

      .project-link, .video-link {
        border-radius: 6px !important;
        text-transform: none !important;
        border: none !important;
      }

      .project-link {
        background: var(--link-color) !important;
        color: #0d1117 !important;
        font-weight: 600 !important;
      }

      .video-link {
        background: var(--link-color) !important;
        color: #0d1117 !important;
      }

      .chat-widget {
        border-radius: 999px !important;
        border: 1px solid var(--border-color) !important;
        background: rgba(22, 27, 34, 0.96) !important;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45) !important;
      }

      .chat-widget.open {
        border-radius: 16px !important;
      }

      .chat-toggle {
        border-radius: 999px !important;
        background: var(--link-color) !important;
      }

      .chat-header {
        background: rgba(13, 17, 23, 0.85) !important;
        color: var(--text-main) !important;
      }

      .chat-message {
        border-radius: 10px !important;
        border: 1px solid var(--border-color) !important;
        background: #0f141b !important;
      }

      .video-modal {
        box-shadow:
          0 20px 45px rgba(0, 0, 0, 0.7),
          0 0 90px rgba(88, 166, 255, 0.35),
          0 0 140px rgba(88, 166, 255, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
      }
    `;

    console.log('Modo Vinhadinho invertido: tema escuro original do index ativado.');
  })();
</script>
